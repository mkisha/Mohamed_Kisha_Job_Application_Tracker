{% extends "base.html" %}

{% block content %}
<h2 class="mb-3">{{ "Edit Application" if application else "Add Application" }}</h2>

<form method="POST" class="card p-4">
    <div class="mb-3">
        <label class="form-label">Job</label>
        <select name="job_id" class="form-select" required>
            <option value="">Select a job</option>
            {% for job in jobs %}
                <option value="{{ job.job_id }}"
                    {% if application and job.job_id == application.job_id %}selected{% endif %}>
                    {{ job.job_title }} - {{ job.company_name }}
                </option>
            {% endfor %}
        </select>
    </div>

    <div class="mb-3">
        <label class="form-label">Application Date</label>
        <input type="date" name="application_date" class="form-control" required
               value="{{ application.application_date if application else '' }}">
    </div>

    <div class="mb-3">
        <label class="form-label">Status</label>
        {% set selected_status = application.status if application else '' %}
        <select name="status" class="form-select">
            <option value="Applied" {% if selected_status == 'Applied' %}selected{% endif %}>Applied</option>
            <option value="Screening" {% if selected_status == 'Screening' %}selected{% endif %}>Screening</option>
            <option value="Interview" {% if selected_status == 'Interview' %}selected{% endif %}>Interview</option>
            <option value="Offer" {% if selected_status == 'Offer' %}selected{% endif %}>Offer</option>
            <option value="Rejected" {% if selected_status == 'Rejected' %}selected{% endif %}>Rejected</option>
            <option value="Withdrawn" {% if selected_status == 'Withdrawn' %}selected{% endif %}>Withdrawn</option>
        </select>
    </div>

    <div class="mb-3">
        <label class="form-label">Resume Version</label>
        <input type="text" name="resume_version" class="form-control"
               value="{{ application.resume_version if application else '' }}">
    </div>

    <div class="form-check mb-3">
        <input type="checkbox" name="cover_letter_sent" class="form-check-input" id="cover_letter_sent"
               {% if application and application.cover_letter_sent %}checked{% endif %}>
        <label class="form-check-label" for="cover_letter_sent">Cover Letter Sent</label>
    </div>

    <div class="mb-3">
        <label class="form-label">Interview Data (JSON or plain text)</label>
        <textarea name="interview_data" class="form-control">{{ application.interview_data_display if application else '' }}</textarea>
    </div>

    <button type="submit" class="btn btn-success">Save</button>
</form>
{% endblock %}
